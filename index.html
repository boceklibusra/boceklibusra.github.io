<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Busra Bocekli</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800;900&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }

body {
  font-family: 'Poppins', sans-serif;
}

.layout {
  display: flex;
  min-height: 100vh;
}

/* Sidebar */
.sidebar {
  width: 260px;
  background: #1c1c1c;
  color: white;
  padding-top: 50px;
}

.name {
  padding: 0 30px 30px;
  font-size: 18px;
  line-height: 1.5;
}

.menu a {
  display: block;
  padding: 16px 30px;
  color: white;
  text-decoration: none;
  border-left: 4px solid transparent;
}

.menu a:hover,
.menu a.active {
  background: #555;
  border-left: 4px solid white;
}

/* Main */
.main {
  flex: 1;
  position: relative;
  background: url('busra.png') center center / cover no-repeat; /* original photo */
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  padding: 40px 60px 120px 60px;
}

/* Text section */
.overlay {
  margin-left: 60px;
  width: 70%;
}

.block {
  padding: 22px 30px;
  font-size: 70px;
  font-weight: 800;
  color: white;
  text-decoration: none;
  display: block;
  text-shadow: 0 2px 10px rgba(0,0,0,0.25);
  animation: fadeUp 0.9s ease both;
}

/* Move ONLY first item slightly down (~1 cm) */
.block:first-child {
  margin-top: 38px;
}

.block:nth-child(2) { animation-delay: 0.15s; }
.block:nth-child(3) { animation-delay: 0.3s; }

.block:hover {
  transform: translateX(8px);
  text-shadow: 0 0 18px rgba(255,255,255,0.45);
}

/* Footer icons centered bottom */
.footer {
  position: absolute;
  left: 50%;
  bottom: 25px;
  transform: translateX(-50%);
  display: flex;
  gap: 18px;
}

.icon {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  color: white;
  background: rgba(0,0,0,0.4);
  font-weight: bold;
}

.linkedin { background: #0077B5; }
.orcid { background: #A6CE39; }
.scholar { background: #4285F4; }
.github { background: #000; }

@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(22px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

</style>
</head>

<body>

<div class="layout">

<div class="sidebar">
  <div class="name">
    Busra<br>
    Bocekli,<br>
    PhD Student
  </div>

  <div class="menu">
    <a class="active" href="index.html">Home</a>
    <a href="about.html">About Me</a>
    <a href="contact.html">Contact</a>
  </div>
</div>

<div class="main">

  <div class="overlay">
    <a class="block" href="research.html">Research.</a>
    <a class="block" href="teaching.html">Teaching.</a>
    <a class="block" href="experience.html">Experiences.</a>
  </div>

  <!-- Footer icons -->
  <div class="footer">
    <a class="icon linkedin" href="https://www.linkedin.com/in/busra-bocekli-14657187" target="_blank">in</a>
    <a class="icon orcid" href="https://orcid.org/0009-0000-7788-9897" target="_blank">iD</a>
    <a class="icon scholar" href="https://scholar.google.com/citations?user=THynCycAAAAJ&hl=en" target="_blank">GS</a>
    <a class="icon github" href="https://github.com/boceklibusra" target="_blank">GH</a>
  </div>

</div>

</div>

</body>
</html>
