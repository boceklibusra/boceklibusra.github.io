<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Busra Bocekli</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    body {
      font-family: 'Poppins', sans-serif;
    }

    .layout {
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 260px;
      background: #1c1c1c;
      color: white;
      padding-top: 50px;
      flex-shrink: 0;
    }

    .name {
      padding: 0 30px 20px;
      font-size: 18px;
      line-height: 1.5;
    }

    /* Footer block inside sidebar */
    .footer {
      padding: 0 30px 24px;
    }

    .footer-icons {
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      gap: 8px;
      align-items: center;
      justify-content: flex-start;
      margin-bottom: 14px;
    }

    .icon-img {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
    }

    .footer-text {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
    }

    .footer-text a {
      color: white;
      text-decoration: none;
      font-size: 13px;
      font-weight: 400;
    }

    .footer-text a:hover {
      opacity: 0.8;
    }

    .line {
      width: 160px;
      height: 1px;
      background: rgba(255, 255, 255, 0.8);
    }

    .footer-text p {
      margin: 0;
      color: white;
      font-size: 12px;
      line-height: 1.5;
      font-weight: 400;
    }

    .menu a {
      display: block;
      padding: 16px 30px;
      color: white;
      text-decoration: none;
      border-left: 4px solid transparent;
    }

    .menu a:hover,
    .menu a.active {
      background: #555;
      border-left: 4px solid white;
    }

    /* Main */
    .main {
      flex: 1;
      position: relative;
      background: url('busra.png') center center / cover no-repeat;
      padding: 40px 60px 120px 60px;
      overflow: hidden;
    }

    /* Text box area */
    .overlay {
      width: 64%;
      margin-top: 95px;
      margin-left: 10px;
      border: 3px solid white;
    }

    .block {
      display: block;
      font-size: 68px;
      font-weight: 800;
      color: white;
      text-decoration: none;
      padding: 34px 40px;
      border-bottom: 3px solid white;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.28);
      transition: transform 0.2s ease, text-shadow 0.2s ease, background 0.2s ease;
      line-height: 1.05;
    }

    .block:last-child {
      border-bottom: none;
    }

    .block:hover {
      transform: translateX(8px);
      text-shadow: 0 0 18px rgba(255, 255, 255, 0.45);
      background: rgba(255, 255, 255, 0.06);
    }

    /* Responsive */
    @media (max-width: 1100px) {
      .overlay {
        width: 78%;
      }

      .block {
        font-size: 54px;
      }
    }

    @media (max-width: 900px) {
      .layout {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        padding-top: 28px;
      }

      .footer {
        padding: 0 30px 20px;
      }

      .main {
        padding: 30px 20px 110px 20px;
      }

      .overlay {
        width: 100%;
        margin-top: 40px;
        margin-left: 0;
      }

      .block {
        font-size: 40px;
        padding: 24px 22px;
      }
    }
  </style>
</head>
<body>
  <div class="layout">

    <div class="sidebar">
      <div class="name">
        Busra<br>
        Bocekli,<br>
        PhD Student
      </div>

      <div class="footer">
        <div class="footer-icons">
          <a href="https://www.linkedin.com/in/busra-bocekli-14657187" target="_blank">
            <img src="linkedin.png" class="icon-img" alt="LinkedIn">
          </a>
          <a href="https://orcid.org/0009-0000-7788-9897" target="_blank">
            <img src="ORCID_iD.png" class="icon-img" alt="ORCID">
          </a>
          <a href="https://scholar.google.com/citations?user=THynCycAAAAJ&hl=en" target="_blank">
            <img src="Google-scholar.png" class="icon-img" alt="Google Scholar">
          </a>
          <a href="https://github.com/boceklibusra" target="_blank">
            <img src="GitHub-Logo.jpg" class="icon-img" alt="GitHub">
          </a>
        </div>

        <div class="footer-text">
          <a href="contact.html">Contact</a>
          <div class="line"></div>
          <p>© 2026 Busra Bocekli. All rights reserved.</p>
        </div>
      </div>

      <div class="menu">
        <a class="active" href="index.html">Home</a>
        <a href="about.html">About Me</a>
        <a href="contact.html">Contact</a>
      </div>
    </div>

    <div class="main">
      <div class="overlay">
        <a class="block" href="research.html">Research.</a>
        <a class="block" href="teaching.html">Teaching.</a>
        <a class="block" href="experience.html">Experience.</a>
      </div>
    </div>

  </div>
</body>
</html>
