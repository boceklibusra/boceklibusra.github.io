<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Busra Bocekli</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />

<style>
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }

body {
  font-family: 'Poppins', sans-serif;
}

/* Layout */
.layout {
  display: flex;
  min-height: 100vh;
}

/* Sidebar */
.sidebar {
  width: 260px;
  background: #1c1c1c;
  color: white;
  padding-top: 50px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

/* Name */
.name {
  padding: 0 30px 20px;
  font-size: 16px;
  line-height: 1.4;
  font-weight: 400;
}

/* Icons */
.footer-icons {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  padding-left: 30px;
}

.icon-img {
  width: 30px;
  height: 30px;
  border-radius: 50%;
}

/* Menu */
.menu a {
  display: block;
  padding: 14px 30px;
  color: white;
  text-decoration: none;
  border-left: 4px solid transparent;
  font-size: 14px;
  font-weight: 400;
}

.menu a:hover,
.menu a.active {
  background: #555;
  border-left: 4px solid white;
}

/* Footer */
.footer-text {
  padding: 20px 30px;
}

.line {
  width: 140px;
  height: 1px;
  background: rgba(255,255,255,0.7);
  margin-bottom: 6px;
}

.footer-text p {
  margin: 0;
  font-size: 11px;
  color: rgba(255,255,255,0.75);
}

/* Main */
.main {
  flex: 1;
  background:
    linear-gradient(rgba(28, 28, 28, 0.35), rgba(28, 28, 28, 0.35)),
    url('busra.png') center top / cover no-repeat;

  position: relative;
  height: 100vh;
  overflow: hidden;
  image-rendering: -webkit-optimize-contrast;
  image-rendering: crisp-edges;
}

/* Overlay box */
.overlay {
  position: absolute;
  top: 20px;
  left: 20px;   /* moved to left side */
  width: 40%;
  border: 1px solid white;
  background: rgba(28, 28, 28, 0.6);
  padding: 10px 0;
  border-radius: 6px;
}

/* Main titles */
.block {
  display: block;
  font-size: 30px;
  font-weight: 600;
  color: white;
  text-decoration: none;
  padding: 26px 32px;
  border-bottom: 1px solid white;
  line-height: 1.1;
  text-align: left;   /* changed from right to left */
}

.block:last-child {
  border-bottom: none;
}

.block:hover {
  transform: translateX(6px);
  background: rgba(255,255,255,0.05);
}

/* Responsive */
@media (max-width: 900px) {
  .layout { flex-direction: column; }

  .sidebar { width: 100%; }

  .overlay {
    width: calc(100% - 40px);
    left: 20px;
    top: 20px;
  }

  .block {
    font-size: 36px;
  }
}
</style>
</head>

<body>

<div class="layout">

  <div class="sidebar">

    <div>
      <div class="name">
        Busra<br>
        Bocekli,<br>
        PhD Candidate
      </div>

      <div class="footer-icons">
        <img src="linkedin.png" class="icon-img">
        <img src="ORCID_iD.png" class="icon-img">
        <img src="Google_scholar.png" class="icon-img">
        <img src="GitHub-Logo.jpg" class="icon-img">
      </div>

      <div class="menu">
        <a class="active" href="index.html">Home</a>
        <a href="about.html">About Me</a>
        <a href="contact.html">Contact</a>
      </div>
    </div>

    <div class="footer-text">
      <div class="line"></div>
      <p>© 2026 Busra Bocekli. All rights reserved.</p>
    </div>

  </div>

  <div class="main">
    <div class="overlay">
      <a class="block" href="research.html">Research.</a>
      <a class="block" href="teaching.html">Teaching.</a>
      <a class="block" href="experience.html">Experience.</a>
    </div>
  </div>

</div>

</body>
</html>
