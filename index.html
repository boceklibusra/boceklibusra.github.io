<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Busra Bocekli | Home</title>

  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
      height: 100%;
    }

    .layout {
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 280px;
      background: #17191d;
      color: white;
      padding-top: 50px;
    }

    .name {
      padding: 0 40px 30px;
      line-height: 1.5;
      font-size: 18px;
    }

    .menu a {
      display: block;
      padding: 18px 40px;
      color: white;
      text-decoration: none;
      border-left: 4px solid transparent;
    }

    .menu a:hover,
    .menu a.active {
      background: #4a4a4a;
      border-left: 4px solid white;
    }

    /* Main area */
    .main {
      flex: 1;
      min-height: 100vh;

      /* ✅ YOUR IMAGE HERE */
      background:
        linear-gradient(rgba(30,18,10,0.6), rgba(30,18,10,0.6)),
        url('busra.png') center center / cover no-repeat;

      display: flex;
      align-items: center;
      padding: 40px 60px;
    }

    /* Big clickable boxes */
    .overlay-links {
      border: 3px solid white;
      width: 70%;
    }

    .panel-link {
      display: block;
      font-size: 64px;
      font-weight: bold;
      color: white;
      text-decoration: none;
      padding: 30px;
      border-bottom: 3px solid white;
    }

    .panel-link:last-child {
      border-bottom: none;
    }

    .panel-link:hover {
      background: rgba(255,255,255,0.15);
    }

    /* Mobile */
    @media (max-width: 900px) {
      .layout {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
      }

      .main {
        padding: 20px;
      }

      .overlay-links {
        width: 100%;
      }

      .panel-link {
        font-size: 40px;
      }
    }

  </style>
</head>

<body>

<div class="layout">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="name">
      Busra<br>
      Bocekli,<br>
      PhD Student
    </div>

    <div class="menu">
      <a href="index.html" class="active">Home</a>
      <a href="about.html">About Me</a>
      <a href="research.html">Research</a>
      <a href="teaching.html">Teaching</a>
      <a href="contact.html">Contact</a>
    </div>
  </div>

  <!-- Main -->
  <div class="main">

    <div class="overlay-links">
      <a class="panel-link" href="research.html">Earthquakes.</a>
      <a class="panel-link" href="teaching.html">Teaching.</a>
      <a class="panel-link" href="about.html">Engineering.</a>
    </div>

  </div>

</div>

</body>
</html>
