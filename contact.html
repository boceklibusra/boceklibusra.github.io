<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Busra Bocekli | Contact</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }

body {
  font-family: 'Poppins', sans-serif;
  display: flex;
  min-height: 100vh;
  color: #222;
  background: #e9e7e4;
}

/* Sidebar */
.sidebar {
  width: 260px;
  background: #1c1c1c;
  color: white;
  padding-top: 50px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.name {
  padding: 0 30px 20px;
  font-size: 16px; /* smaller */
  line-height: 1.4;
}

.menu a {
  display: block;
  padding: 14px 30px;
  color: white;
  text-decoration: none;
  border-left: 4px solid transparent;
  font-weight: 400;
  font-size: 14px;
}

.menu a:hover,
.menu a.active {
  background: #555;
  border-left: 4px solid white;
}

/* Footer */
.sidebar-footer {
  padding: 18px 30px;
}

.line {
  width: 140px;
  height: 1px;
  background: rgba(255,255,255,0.6);
  margin-bottom: 6px;
}

.sidebar-footer p {
  margin: 0;
  font-size: 11px;
  color: rgba(255,255,255,0.75);
  font-weight: 400;
}

/* Main */
.main {
  flex: 1;
  padding: 28px 40px; /* smaller */
}

.contact-layout {
  display: grid;
  grid-template-columns: 320px 1fr;
  gap: 28px;
}

/* LEFT SIDE */
.left-panel h1 {
  font-size: 2rem;
  font-weight: 500;
  text-align: center;
  margin-bottom: 16px;
}

.left-panel h2 {
  font-size: 1.1rem;
  text-align: center;
  margin-bottom: 12px;
}

/* Icons */
.icon-row {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-bottom: 18px;
}

.icon-img {
  width: 40px; /* smaller */
  height: 40px;
  border-radius: 50%;
}

/* Text */
.left-panel p {
  font-size: 0.85rem;
  line-height: 1.6;
  text-align: center;
  max-width: 280px;
  margin: auto;
}

/* FORM */
.form-card {
  border-radius: 10px;
  overflow: hidden;
}

/* 🔥 KEY FIX: smaller Google Form */
iframe {
  width: 100%;
  height: 600px; /* ↓ reduced from 800 */
  border: none;
}

.note {
  margin-top: 10px;
  font-size: 0.85rem;
  color: #666;
}

/* Responsive */
@media (max-width: 900px) {
  body { flex-direction: column; }

  .sidebar {
    width: 100%;
  }

  .contact-layout {
    grid-template-columns: 1fr;
  }

  iframe {
    height: 700px;
  }
}
</style>
</head>

<body>

<div class="sidebar">
  <div>
    <div class="name">
      Busra<br>
      Bocekli,<br>
      PhD Student
    </div>

    <div class="menu">
      <a href="index.html">Home</a>
      <a href="about.html">About Me</a>
      <a href="contact.html" class="active">Contact</a>
    </div>
  </div>

  <div class="sidebar-footer">
    <div class="line"></div>
    <p>© 2026 Busra Bocekli. All rights reserved.</p>
  </div>
</div>

<div class="main">
  <div class="contact-layout">

    <!-- LEFT -->
    <div class="left-panel">
      <h1>Contact Me</h1>
      <h2>Find me online:</h2>

      <div class="icon-row">
        <a href="https://www.linkedin.com/in/busra-bocekli-14657187" target="_blank">
          <img src="linkedin.png" class="icon-img">
        </a>
        <a href="https://orcid.org/0009-0000-7788-9897" target="_blank">
          <img src="ORCID_iD.png" class="icon-img">
        </a>
        <a href="https://scholar.google.com/citations?user=THynCycAAAAJ&hl=en" target="_blank">
          <img src="Google_scholar.png" class="icon-img">
        </a>
        <a href="https://github.com/boceklibusra" target="_blank">
          <img src="GitHub-Logo.jpg" class="icon-img">
        </a>
      </div>

      <p>
        Feel free to reach out if you'd like to connect, collaborate, or learn more about my work.
      </p>
    </div>

    <!-- RIGHT -->
    <div class="form-card">
      <iframe src="https://docs.google.com/forms/d/e/1FAIpQLScltuVR2V7MlQHemxNbNRmigijVB5r_Ke8VpWSVllW4M4Cd4w/viewform?embedded=true"></iframe>
      <div class="note">Never submit passwords through this form.</div>
    </div>

  </div>
</div>

</body>
</html>
